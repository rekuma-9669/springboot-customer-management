<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>登録確認</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
          <h4 class="mb-0">登録確認</h4>
        </div>

        <div class="card-body">

          <p class="text-muted mb-4">
            以下の内容で登録します。よろしいですか？
          </p>

          <!-- 表示用 -->
          <div class="row g-3">

            <div class="col-md-6">
              <div class="text-muted small">姓</div>
              <div class="fw-semibold" th:text="${form.lastName}"></div>
            </div>

            <div class="col-md-6">
              <div class="text-muted small">名</div>
              <div class="fw-semibold" th:text="${form.firstName}"></div>
            </div>

            <div class="col-md-6">
              <div class="text-muted small">Email</div>
              <div class="fw-semibold" th:text="${form.email}"></div>
            </div>

            <div class="col-md-6">
              <div class="text-muted small">登録状態</div>
              <div class="fw-semibold" th:text="${form.active == '1' ? '登録中' : '停止'}"></div>
            </div>

            <div class="col-md-6">
              <div class="text-muted small">Store</div>
              <div class="fw-semibold" th:text="${form.storeId}"></div>
            </div>

            <hr class="my-4">

            <div class="col-12">
              <div class="text-muted small">住所</div>
              <div class="fw-semibold" th:text="${form.address}"></div>
            </div>

            <div class="col-md-6">
              <div class="text-muted small">地区</div>
              <div class="fw-semibold" th:text="${form.district}"></div>
            </div>

            <div class="col-md-6">
              <div class="text-muted small">郵便番号</div>
              <div class="fw-semibold" th:text="${form.postalCode}"></div>
            </div>

            <div class="col-md-6">
              <div class="text-muted small">都市ID</div>
              <div class="fw-semibold" th:text="${form.cityId}"></div>
              <!-- 余裕あれば都市名にする（後述） -->
            </div>

            <div class="col-md-6">
              <div class="text-muted small">電話番号</div>
              <div class="fw-semibold" th:text="${form.phone}"></div>
            </div>

          </div>

          <!-- 登録確定 -->
          <form th:action="@{/customers/new}" method="post" th:object="${form}" class="mt-4">
            <!-- hiddenで値引き継ぎ -->
            <input type="hidden" th:field="*{firstName}">
            <input type="hidden" th:field="*{lastName}">
            <input type="hidden" th:field="*{email}">
            <input type="hidden" th:field="*{active}">
            <input type="hidden" th:field="*{storeId}">
            <input type="hidden" th:field="*{address}">
            <input type="hidden" th:field="*{district}">
            <input type="hidden" th:field="*{cityId}">
            <input type="hidden" th:field="*{postalCode}">
            <input type="hidden" th:field="*{phone}">

            <div class="d-flex justify-content-between">
              <!-- 戻って修正 -->
              <a th:href="@{/customers/new}" class="btn btn-outline-secondary">
                ← 戻って修正
              </a>

              <button type="submit" class="btn btn-success">
                登録する
              </button>
            </div>
          </form>

        </div>
      </div>

      <div class="text-center text-muted small mt-3">
        ※ 登録後は検索画面へ戻ります
      </div>

    </div>
  </div>
</div>
</body>
</html>
