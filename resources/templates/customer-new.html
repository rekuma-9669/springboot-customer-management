<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>顧客追加</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
          <h4 class="mb-0">＋ 顧客追加</h4>
        </div>

        <div class="card-body">

          <form th:action="@{/customers/new/confirm}"
                method="post"
                th:object="${form}"
                class="row g-3">

            <!-- 基本情報 -->
            <h5 class="mt-2">基本情報</h5>

            <div class="col-md-6">
              <label class="form-label">姓</label>
              <input class="form-control" th:field="*{lastName}">
            </div>

            <div class="col-md-6">
              <label class="form-label">名</label>
              <input class="form-control" th:field="*{firstName}">
            </div>

            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input class="form-control" th:field="*{email}">
            </div>

            <div class="col-md-6">
              <label class="form-label">登録状態</label>
              <select class="form-select" th:field="*{active}">
                <option value="1">登録中</option>
                <option value="0">停止</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">Store</label>
              <select class="form-select" th:field="*{storeId}">
                <option value="1">Store 1</option>
                <option value="2">Store 2</option>
              </select>
            </div>

            <hr class="mt-4">

            <!-- 住所情報 -->
            <h5>住所情報</h5>

            <div class="col-12">
              <label class="form-label">住所</label>
              <input class="form-control" th:field="*{address}">
            </div>

            <div class="col-md-6">
              <label class="form-label">地区</label>
              <input class="form-control" th:field="*{district}">
            </div>

            <div class="col-md-6">
              <label class="form-label">郵便番号</label>
              <input class="form-control" th:field="*{postalCode}">
            </div>

            <div class="col-md-6">
              <label class="form-label">都市</label>
              <select class="form-select" th:field="*{cityId}">
                <option value="">選択してください</option>
                <option th:each="c : ${cities}"
                        th:value="${c.cityId}"
                        th:text="${c.countryName + ' - ' + c.cityName}">
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">電話番号</label>
              <input class="form-control" th:field="*{phone}">
            </div>

            <!-- ボタン -->
            <div class="col-12 d-flex justify-content-between mt-4">
              <a th:href="@{/search}" class="btn btn-outline-secondary">
                ← 戻る
              </a>

              <button type="submit" class="btn btn-success">
                確認画面へ →
              </button>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
