<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customers</title>
</head>
<body>

<h1>検索結果(上位20件表示)</h1>

<p th:text="${selectedCountry}"></p>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>メールアドレス</th>
            <th>登録情報</th>
            <th>出身地</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="c : ${customers}">
            <td th:text="${c.customerId}"></td>
            <td th:text="${c.firstName}"></td>
            <td th:text="${c.lastName}"></td>
            <td th:text="${c.email}"></td>
            <td th:text="${c.active == 1 ? 'Active' : 'Inactive'}"></td>
            <td th:text="${c.country}"></td>
        </tr>
    </tbody>
</table>

<a th:href="@{/search}">戻る</a>

</body>
</html>
