<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>顧客詳細</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body>
	<div class="container my-4">

		<!-- ヘッダー -->
		<div class="d-flex align-items-center justify-content-between mb-3">
			<div>
				<h2 class="mb-0">
					顧客詳細 <small class="text-muted">#<span
						th:text="${customer.customerId}"></span></small>
				</h2>

				<div class="mt-2">
					<span th:if="${customer.active == 1}" class="badge bg-success">登録中</span>
					<span th:if="${customer.active != 1}" class="badge bg-danger">停止</span>
					<span class="ms-2 text-muted">Store: <span
						th:text="${customer.storeId}"></span></span>
				</div>
			</div>

			<div class="d-flex gap-2">
				<a
					th:href="@{/search(
    lastName=${lastName},
    firstName=${firstName},
    email=${email},
    active=${active},
    country=${country}
)}"
					class="btn btn-outline-secondary"> 検索へ戻る </a> <a
					th:href="@{/customers/{id}/edit(id=${customer.customerId})}"
					th:classappend="${customer.active != 1} ? ' disabled' : ''"
					class="btn btn-primary"> 編集 </a>

				<!-- 停止（削除） -->
				<button type="button" class="btn btn-danger" data-bs-toggle="modal"
					data-bs-target="#deleteModal">停止</button>
			</div>
		</div>

		<!-- カード：基本情報 -->
		<div class="card mb-3">
			<div class="card-header">基本情報</div>
			<div class="card-body">
				<div class="row g-3">

					<div class="col-md-4">
						<div class="text-muted small">氏名</div>
						<div class="fw-semibold"
							th:text="${customer.lastName + ' ' + customer.firstName}"></div>
					</div>

					<div class="col-md-4">
						<div class="text-muted small">Email</div>
						<div class="fw-semibold" th:text="${customer.email}"></div>
					</div>

					<div class="col-md-4">
						<div class="text-muted small">電話番号</div>
						<div class="fw-semibold" th:text="${customer.phone}"></div>
					</div>

				</div>
			</div>
		</div>

		<!-- カード：住所 -->
		<div class="card">
			<div class="card-header">住所</div>
			<div class="card-body">
				<div class="row g-3">

					<div class="col-md-6">
						<div class="text-muted small">住所</div>
						<div class="fw-semibold" th:text="${customer.address}"></div>
					</div>

					<div class="col-md-3">
						<div class="text-muted small">地区</div>
						<div class="fw-semibold" th:text="${customer.district}"></div>
					</div>

					<div class="col-md-3">
						<div class="text-muted small">郵便番号</div>
						<div class="fw-semibold" th:text="${customer.postalCode}"></div>
					</div>

					<div class="col-md-6">
						<div class="text-muted small">都市</div>
						<div class="fw-semibold" th:text="${customer.city}"></div>
					</div>

					<div class="col-md-6">
						<div class="text-muted small">国</div>
						<div class="fw-semibold" th:text="${customer.country}"></div>
					</div>

				</div>
			</div>
		</div>
		<div class="modal fade" id="deleteModal" tabindex="-1"
			aria-labelledby="deleteModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">

					<div class="modal-header">
						<h5 class="modal-title" id="deleteModalLabel">顧客停止の確認</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"
							aria-label="閉じる"></button>
					</div>

					<div class="modal-body">
						<p>この顧客を停止しますか？</p>
						<ul class="mb-0">
							<li>ID: <span th:text="${customer.customerId}"></span></li>
							<li>氏名: <span
								th:text="${customer.lastName + ' ' + customer.firstName}"></span></li>
							<li>Email: <span th:text="${customer.email}"></span></li>
						</ul>
					</div>

					<div class="modal-footer">
						<button type="button" class="btn btn-secondary"
							data-bs-dismiss="modal">キャンセル</button>

						<form
							th:action="@{/customers/{id}/delete(id=${customer.customerId})}"
							method="post" class="d-inline">
							<button type="submit" class="btn btn-danger">停止する</button>
						</form>
					</div>

				</div>
			</div>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
