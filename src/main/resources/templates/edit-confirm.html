<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>編集確認</title>
</head>
<body>

	<h1>編集確認</h1>
	<p>この内容で更新しますか？</p>

	<ul>
		<li>ID: <span th:text="${customer.customerId}"></span></li>
		<li>姓: <span th:text="${customer.lastName}"></span></li>
		<li>名: <span th:text="${customer.firstName}"></span></li>
		<li>Email: <span th:text="${customer.email}"></span></li>
	</ul>

	<form th:action="@{/customers/{id}/edit(id=${customer.customerId})}"
		method="post">
		<input type="hidden" name="lastName" th:value="${customer.lastName}">
		<input type="hidden" name="firstName" th:value="${customer.firstName}">
		<input type="hidden" name="email" th:value="${customer.email}">
		<button type="submit">更新する</button>
	</form>

	<form th:action="@{/customers/{id}/edit(id=${customer.customerId})}"
		method="get">
		<button type="submit">戻って修正</button>
	</form>

</body>
</html>
