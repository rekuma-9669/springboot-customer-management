<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>顧客編集</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">
            顧客編集
            <small>#<span th:text="${form.customerId}"></span></small>
          </h4>
        </div>

        <div class="card-body">

          <!-- 状態表示 -->
          <div class="mb-3">
            <span th:if="${form.active == 1}" class="badge bg-success">登録中</span>
            <span th:if="${form.active != 1}" class="badge bg-danger">停止</span>
          </div>

          <form th:action="@{/customers/{id}/edit(id=${form.customerId})}"
                method="post"
                th:object="${form}"
                class="row g-3">

            <input type="hidden" th:field="*{customerId}">

            <!-- 基本情報 -->
            <h5 class="mt-2">基本情報</h5>

            <div class="col-md-6">
              <label class="form-label">姓</label>
              <input class="form-control" th:field="*{lastName}">
            </div>

            <div class="col-md-6">
              <label class="form-label">名</label>
              <input class="form-control" th:field="*{firstName}">
            </div>

            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input class="form-control" th:field="*{email}">
            </div>

            <div class="col-md-6">
              <label class="form-label">登録状態</label>
              <select class="form-select" th:field="*{active}">
                <option value="1">登録中</option>
                <option value="0">停止</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">Store</label>
              <select class="form-select" th:field="*{storeId}">
                <option value="1">Store 1</option>
                <option value="2">Store 2</option>
              </select>
            </div>

            <hr class="mt-4">

            <!-- ボタン -->
            <div class="col-12 d-flex justify-content-between mt-4">
              <a th:href="@{/customers/{id}(id=${form.customerId})}"
                 class="btn btn-outline-secondary">
                ← 詳細へ戻る
              </a>

              <button type="submit"
                      class="btn btn-primary">
                更新する
              </button>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
