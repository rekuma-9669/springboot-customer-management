<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

    <h1 class="mb-4">顧客検索</h1>

    <form th:action="@{/search}" method="get" class="row g-3">

        <div class="col-md-3">
            <label class="form-label">姓</label>
            <input type="text" name="lastName" class="form-control" th:value="${qLastName}">
        </div>

        <div class="col-md-3">
            <label class="form-label">名</label>
            <input type="text" name="firstName" class="form-control" th:value="${qFirstName}">
        </div>

        <div class="col-md-3">
            <label class="form-label">メール</label>
            <input type="text" name="email" class="form-control" th:value="${qEmail}">
        </div>

        <div class="col-md-3">
            <label class="form-label">状態</label>
            <select name="active" class="form-select">
                <option value="" th:selected="${qActive == null || qActive == ''}">指定なし</option>
                <option value="1" th:selected="${qActive == '1'}">登録中</option>
                <option value="0" th:selected="${qActive == '0'}">停止</option>
            </select>
        </div>

        <div class="col-md-3">
            <label class="form-label">国</label>
            <select name="country" class="form-select">
                <option value="" th:selected="${qCountry == null || qCountry == ''}">指定なし</option>
                <option th:each="c : ${countries}"
                        th:value="${c}"
                        th:text="${c}"
                        th:selected="${qCountry == c}">
                </option>
            </select>
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-primary">検索</button>
            <a th:href="@{/search}" class="btn btn-secondary">クリア</a>
            <a th:href="@{/customers/new}" class="btn btn-success">＋ 新規追加</a>
        </div>

    </form>

    <div th:if="${customers != null and !customers.isEmpty()}">
        <h2 class="mt-4">検索結果（上位20件）</h2>

        <table class="table table-striped table-hover mt-3">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>名前</th>
                <th>Email</th>
                <th>状態</th>
                <th>国</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${customers}">
                <td th:text="${c.customerId}"></td>
                <td th:text="${c.lastName + ' ' + c.firstName}"></td>
                <td th:text="${c.email}"></td>
                <td>
                    <span th:if="${c.active == 1}" class="badge bg-success">登録中</span>
                    <span th:if="${c.active == 0}" class="badge bg-danger">停止</span>
                </td>
                <td th:text="${c.country}"></td>
                <td>
                    <a th:href="@{/customers/{id}(
                        id=${c.customerId},
                        lastName=${qLastName},
                        firstName=${qFirstName},
                        email=${qEmail},
                        active=${qActive},
                        country=${qCountry}
                    )}"
                       class="btn btn-sm btn-outline-primary">
                        詳細
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
